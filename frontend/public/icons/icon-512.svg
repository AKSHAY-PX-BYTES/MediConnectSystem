<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Full-bleed brand background (required for maskable safe zone) -->
  <rect width="512" height="512" fill="#2563eb"/>

  <!-- Outer rounded badge -->
  <rect x="52" y="52" width="408" height="408" rx="96" fill="#1d4ed8"/>

  <!-- Medical cross — horizontal bar -->
  <rect x="136" y="218" width="240" height="76" rx="22" fill="white"/>

  <!-- Medical cross — vertical bar -->
  <rect x="218" y="136" width="76" height="240" rx="22" fill="white"/>

  <!-- Small circle accent (stethoscope dot) -->
  <circle cx="256" cy="256" r="28" fill="#2563eb"/>
</svg>
