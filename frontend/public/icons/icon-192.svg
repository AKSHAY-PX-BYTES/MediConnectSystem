<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Full-bleed brand background (required for maskable safe zone) -->
  <rect width="192" height="192" fill="#2563eb"/>

  <!-- Outer rounded badge -->
  <rect x="20" y="20" width="152" height="152" rx="36" fill="#1d4ed8"/>

  <!-- Medical cross — horizontal bar -->
  <rect x="52" y="82" width="88" height="28" rx="8" fill="white"/>

  <!-- Medical cross — vertical bar -->
  <rect x="82" y="52" width="28" height="88" rx="8" fill="white"/>

  <!-- Small circle accent (stethoscope dot) -->
  <circle cx="96" cy="96" r="10" fill="#2563eb"/>
</svg>
