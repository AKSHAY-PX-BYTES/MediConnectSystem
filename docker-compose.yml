services:
  db:
    image: postgres:16-alpine
    container_name: mediconnect-db
    environment:
      POSTGRES_USER: mediconnect
      POSTGRES_PASSWORD: mediconnect
      POSTGRES_DB: mediconnect
    ports:
      - "5432:5432"
    volumes:
      - mediconnect_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediconnect"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: mediconnect-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Default: "Host=db;Port=5432;Database=mediconnect;Username=mediconnect;Password=mediconnect"
      Jwt__Secret: "local_dev_super_secret_key_change_me_at_least_32_chars"
      Cors__Origins__0: "http://localhost:8080"
    ports:
      - "5080:8080"

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: mediconnect-web
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  mediconnect_pgdata:
